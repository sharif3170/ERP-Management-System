</div>
    </div>
    <div class="main-content">
        <h1>Supplier Management</h1>
        <div class="form-container">
            <input
                type="text"
                id="supplierName"
                placeholder="Supplier Name">
            <input
                type="email"
                id="email"
                placeholder="Email">
            <input
                type="text"
                id="phone"
                placeholder="Phone Number">
            <input
                type="text"
                id="address"
                placeholder="Address">
            <button
                id="supplierBtn"
                onclick="saveSupplier()">
                Save Supplier
            </button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="supplierTable">
            </tbody>
        </table>
